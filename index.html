<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OIBSIP Web Development Level 1</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
        }

        .container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
        }

        h2 {
            margin-bottom: 30px;
            font-size: 18px;
            color: #666;
        }

        .btn {
            display: block;
            text-decoration: none;
            background: #4e73df;
            color: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2e59d9;
            transform: translateY(-3px);
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>OIBSIP Internship</h1>
    <h2>Web Development Level 1 Projects</h2>

    <a href="task1/" class="btn">🌐 Task 1 - Landing Page</a>
    <a href="task2/" class="btn">👤 Task 2 - Portfolio</a>
    <a href="task3/" class="btn">🌡️ Task 3 - Temperature Converter</a>

    <footer>
        © 2026 Haridas Sai Ganesh
    </footer>
</div>

</body>
</html>
