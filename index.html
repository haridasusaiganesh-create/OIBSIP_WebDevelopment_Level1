<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OIBSIP Web Development Tasks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .main-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 400px;
        }

        h1 {
            color: white;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .task-link {
            display: block;
            text-decoration: none;
            margin: 15px 0;
            padding: 15px;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }

        .task1 {
            background: linear-gradient(90deg, #ff512f, #dd2476);
        }

        .task2 {
            background: linear-gradient(90deg, #11998e, #38ef7d);
        }

        .task3 {
            background: linear-gradient(90deg, #396afc, #2948ff);
        }

        .task-link:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        footer {
            margin-top: 30px;
            color: white;
            font-size: 14px;
        }

        @media (max-width: 420px) {
            .main-container {
                width: 90%;
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1>OIBSIP Web Development Internship</h1>

        <!-- Correct Folder Links -->
        <a href="task%201/" class="task-link task1">
            Task 1 - Landing Page
        </a>

        <a href="task%202/" class="task-link task2">
            Task 2 - Portfolio
        </a>

        <a href="task%203/" class="task-link task3">
            Task 3 - Temperature Converter
        </a>

        <footer>
            © 2026 Sai Ganesh | All Tasks
        </footer>
    </div>

</body>
</html>
