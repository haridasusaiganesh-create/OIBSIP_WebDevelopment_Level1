<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temperature Converter</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 30px;
        width: 320px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin: 10px 0;
        font-size: 16px;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        background: #1e88e5;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #1565c0;
    }

    #result {
        margin-top: 15px;
        font-size: 18px;
        text-align: center;
        font-weight: bold;
    }

    .error {
        color: red;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Temperature Converter</h2>

    <label>Enter Temperature:</label>
    <input type="text" id="tempInput" placeholder="Enter value">

    <label>Select Unit:</label>
    <select id="unit">
        <option value="celsius">Celsius</option>
        <option value="fahrenheit">Fahrenheit</option>
        <option value="kelvin">Kelvin</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <div id="result"></div>
    <div id="error" class="error"></div>
</div>

<script>
function convertTemp() {
    let input = document.getElementById("tempInput").value;
    let unit = document.getElementById("unit").value;
    let result = document.getElementById("result");
    let error = document.getElementById("error");

    result.innerHTML = "";
    error.innerHTML = "";

    if (input === "" || isNaN(input)) {
        error.innerHTML = "Please enter a valid number!";
        return;
    }

    let temp = parseFloat(input);
    let convertedValue = "";
    let convertedUnit = "";

    if (unit === "celsius") {
        convertedValue = (temp * 9/5) + 32;
        convertedUnit = "°F";
    } 
    else if (unit === "fahrenheit") {
        convertedValue = (temp - 32) * 5/9;
        convertedUnit = "°C";
    } 
    else if (unit === "kelvin") {
        convertedValue = temp - 273.15;
        convertedUnit = "°C";
    }

    result.innerHTML = convertedValue.toFixed(2) + " " + convertedUnit;
}
</script>

</body>
</html>
