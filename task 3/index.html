<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 3 | Temperature Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="converter-box">
    <h1>Temperature Converter</h1>
    
    <!-- Input Field -->
    <input type="number" id="tempInput" placeholder="Enter Temperature">
    
    <!-- Unit Selection -->
    <div class="unit-select">
      <label><input type="radio" name="unit" value="C" checked> Celsius</label>
      <label><input type="radio" name="unit" value="F"> Fahrenheit</label>
      <label><input type="radio" name="unit" value="K"> Kelvin</label>
    </div>
    
    <!-- Convert Button -->
    <button class="cta-btn" onclick="convertTemp()">Convert</button>
    
    <!-- Result Display -->
    <p class="result" id="result">Result will appear here</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
