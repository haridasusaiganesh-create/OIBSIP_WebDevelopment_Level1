<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task 3 | Temperature Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Converter Box -->
  <section class="converter-section">
    <div class="converter-box">
      <h1>Temperature Converter<span>.</span></h1>
      <input type="number" id="tempInput" placeholder="Enter Temperature">
      
      <div class="unit-select">
        <label>
          <input type="radio" name="unit" value="C" checked> Celsius
        </label>
        <label>
          <input type="radio" name="unit" value="F"> Fahrenheit
        </label>
        <label>
          <input type="radio" name="unit" value="K"> Kelvin
        </label>
      </div>
      
      <button class="cta-btn" onclick="convertTemp()">Convert</button>
      <p class="result" id="result">Result will appear here</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
